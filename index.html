<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Escala Anual de Férias DPE-PI</title>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc, getDocs, collection } 
    from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

  // ══════════════════════════════════════════════════════
  // CONFIGURAÇÃO FIREBASE
  // Substitua os valores abaixo pelos do seu projeto Firebase
  // (Firestore → Configurações do projeto → Seus apps → Config SDK)
  // ══════════════════════════════════════════════════════
  const firebaseConfig = {
    apiKey: "AIzaSyDOeDuCIOw_jHQqXr482nN5ZB6idllsU3Y",
    authDomain: "sistema-anual-ferias-dpe.firebaseapp.com",
    projectId: "sistema-anual-ferias-dpe",
    storageBucket: "sistema-anual-ferias-dpe.firebasestorage.app",
    messagingSenderId: "657082148722",
    appId: "1:657082148722:web:926bae4e4964adce961feb",
    measurementId: "G-F39T8ED0T0"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);

  // ──────────────────────────────────────────────────────
  // Expõe funções de storage para o código do app
  // ──────────────────────────────────────────────────────
  window._db = db;

  // Helper: rejeita após N milissegundos (evita trava infinita quando Firestore não está ativado)
  function withTimeout(promise, ms, msg) {
    const t = new Promise((_, reject) =>
      setTimeout(() => reject(new Error(msg || 'Timeout após ' + (ms/1000) + 's')), ms)
    );
    return Promise.race([promise, t]);
  }

  function firestoreErro(e, contexto) {
    console.error('Firestore [' + contexto + ']:', e.code, e.message);
    if (e.code === 'permission-denied')
      throw new Error('Acesso negado pelo Firestore. Verifique as regras de segurança no console Firebase (deve ser: allow read, write: if true;).');
    if (e.code === 'unavailable' || (e.message && e.message.includes('Timeout')))
      throw new Error('Não foi possível conectar ao Firestore. Verifique se o banco de dados foi criado/ativado no console Firebase (Firestore Database → Criar banco de dados).');
    throw new Error('Erro Firestore [' + (e.code || 'desconhecido') + ']: ' + e.message);
  }

  window.dbSave = async function(ano, dirKey, payload) {
    const col = (typeof ano==='string'&&ano.startsWith('_')) ? ano : 'escala'+ano;
    try {
      await withTimeout(setDoc(doc(db,col,dirKey),payload),
        15000,'Timeout ao salvar.');
    } catch(e) { firestoreErro(e,'dbSave'); }
  };

  window.dbLoad = async function(ano, dirKey) {
    const col = (typeof ano==='string'&&ano.startsWith('_')) ? ano : 'escala'+ano;
    try {
      const snap = await withTimeout(getDoc(doc(db,col,dirKey)),
        10000,'Timeout ao carregar.');
      return snap.exists() ? snap.data() : null;
    } catch(e) { firestoreErro(e,'dbLoad'); }
  };

  window.dbLoadAll = async function(ano) {
    try {
      const snap = await withTimeout(
        getDocs(collection(db, 'escala'+ano)),
        12000, 'Timeout ao carregar todas as diretorias. Verifique se o Firestore está ativado no console Firebase.'
      );
      const result = {};
      snap.forEach(d => { result[d.id] = d.data(); });
      return result;
    } catch(e) { firestoreErro(e, 'dbLoadAll'); }
  };

  // ── SEED AUTOMÁTICO ────────────────────────────────────────────────────────
  // Na primeira conexão com Firestore vazio, popula todos os dados das planilhas
  window.dbSeed = async function() {
    try {
      // Verifica se já existe dado real no Firestore (não apenas a flag de controle)
      // Isso evita o problema de seed "falso": marcado como done mas sem dados
      const testSnap = await withTimeout(getDoc(doc(db,'escala2027','DPG')), 8000, 'timeout');
      if (testSnap.exists() && Object.keys(testSnap.data()).length > 0) {
        console.log('[SEED] Dados já existem no Firestore — pulando seed.');
        return;
      }
      
      console.log('[SEED] Iniciando população automática do Firestore...');
      const dadosSeed = window.DADOS_ANOS || {};
      const anos = Object.keys(dadosSeed).map(Number);
      
      for (const ano of anos) {
        const dadosAno = dadosSeed[ano];
        for (const [dirKey, dirData] of Object.entries(dadosAno)) {
          const defensores = dirData.defensores || [];
          const payload = {};
          defensores.forEach((d, i) => {
            const key = d.matricula + '_' + i;
            payload[key] = {
              portaria_p1: d.portaria || '',
              portaria_p2: d.portaria || '',
              portaria2027: d.portaria || '',
              p1e1_ini: d.p1e1_ini || '', p1e1_fim: d.p1e1_fim || '',
              p1e2_ini: d.p1e2_ini || '', p1e2_fim: d.p1e2_fim || '',
              p1e3_ini: d.p1e3_ini || '', p1e3_fim: d.p1e3_fim || '',
              p2e1_ini: d.p2e1_ini || '', p2e1_fim: d.p2e1_fim || '',
              p2e2_ini: d.p2e2_ini || '', p2e2_fim: d.p2e2_fim || '',
              p2e3_ini: d.p2e3_ini || '', p2e3_fim: d.p2e3_fim || '',
              alterado: false
            };
          });
          if (Object.keys(payload).length > 0) {
            await withTimeout(setDoc(doc(db,'escala'+ano, dirKey), payload), 15000, 'timeout seed');
            console.log('[SEED] ' + ano + '/' + dirKey + ': ' + Object.keys(payload).length + ' registros');
          }
        }
      }
      // Marca como concluído
      await setDoc(doc(db,'_controle','seed'), {done: true, data: new Date().toISOString()});
      console.log('[SEED] Concluído!');
    } catch(e) {
      console.warn('[SEED] Erro (não crítico):', e.message);
    }
  };

</script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

:root{
  --verde:#1a4a2e;--verde-mid:#2d6b47;--verde-light:#4a9165;--verde-pale:#e8f3ec;
  --ouro:#c9a227;--ouro-light:#f5e6b0;
  --cinza-escuro:#1c1c1c;--cinza:#4a4a4a;--cinza-mid:#8a8a8a;
  --cinza-light:#d4d4d4;--branco:#fafaf8;--papel:#f5f3ee;--linha:#e0dcd4;
  --erro:#9b2020;--aviso:#b85c00;
  --shadow:0 2px 12px rgba(26,74,46,.10);--shadow-lg:0 8px 32px rgba(26,74,46,.14);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--papel);color:var(--cinza-escuro);min-height:100vh;font-size:14px}

/* LOGIN */
#login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--verde) 0%,var(--verde-mid) 60%,var(--verde-light) 100%);padding:20px}
.login-card{background:var(--branco);border-radius:4px;padding:48px 40px 40px;width:100%;max-width:460px;box-shadow:var(--shadow-lg)}
.login-logo{text-align:center;margin-bottom:32px}
.login-logo img{display:block;margin:0 auto 12px}

.login-logo .escudo{font-size:48px;line-height:1;margin-bottom:8px}
.login-logo h1{font-family:'Crimson Pro',serif;font-size:20px;font-weight:700;color:var(--verde);line-height:1.3}
.login-logo p{font-size:11px;color:var(--cinza-mid);letter-spacing:.08em;text-transform:uppercase;margin-top:4px}
.login-card h2{font-size:13px;font-weight:500;color:var(--cinza-mid);text-transform:uppercase;letter-spacing:.08em;
  margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--linha)}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--cinza);margin-bottom:6px}
.form-group select,.form-group input{width:100%;padding:10px 12px;border:1.5px solid var(--cinza-light);
  border-radius:3px;font-family:'IBM Plex Sans',sans-serif;font-size:13px;color:var(--cinza-escuro);
  background:var(--branco);transition:border-color .15s;outline:none}
.form-group select:focus,.form-group input:focus{border-color:var(--verde-mid)}
.btn-entrar{width:100%;padding:12px;background:var(--verde);color:#fff;border:none;border-radius:3px;
  font-family:'IBM Plex Sans',sans-serif;font-size:13px;font-weight:600;letter-spacing:.05em;
  text-transform:uppercase;cursor:pointer;margin-top:8px;transition:background .15s}
.btn-entrar:hover{background:var(--verde-mid)}
.login-error{background:#fdf0f0;border:1px solid #f0c0c0;color:var(--erro);padding:10px 12px;
  border-radius:3px;font-size:12px;margin-top:12px;display:none}
.login-note{font-size:11px;color:var(--cinza-mid);line-height:1.5;margin-top:16px;
  padding:10px 12px;background:#f0f4f0;border-radius:3px}
.login-note strong{font-weight:600;color:var(--verde)}

/* APP */
#app{display:none;min-height:100vh;flex-direction:column}
.topbar{background:var(--verde);color:#fff;padding:0 24px;height:56px;display:flex;
  align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;
  box-shadow:0 2px 8px rgba(0,0,0,.2)}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-logo{font-family:'Crimson Pro',serif;font-size:16px;font-weight:700;letter-spacing:.02em}
.topbar-diretoria{background:rgba(255,255,255,.15);padding:4px 10px;border-radius:2px;
  font-size:11px;font-weight:500;letter-spacing:.06em;text-transform:uppercase}
.topbar-right{display:flex;align-items:center;gap:12px}
.topbar-ano{font-family:'IBM Plex Mono',monospace;font-size:18px;font-weight:500;opacity:.7}
.btn-sair{background:transparent;border:1px solid rgba(255,255,255,.3);color:#fff;
  padding:5px 12px;border-radius:2px;font-size:11px;font-weight:500;text-transform:uppercase;
  letter-spacing:.06em;cursor:pointer;transition:background .15s}
.btn-sair:hover{background:rgba(255,255,255,.1)}

.main-content{flex:1;padding:28px 24px;max-width:1200px;margin:0 auto;width:100%}

.page-header-bar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:20px}
.page-header h2{font-family:'Crimson Pro',serif;font-size:26px;font-weight:700;color:var(--verde);line-height:1.2}
.page-header p{font-size:12px;color:var(--cinza-mid);margin-top:4px}

.status-bar{background:var(--verde-pale);border:1px solid rgba(74,145,101,.25);border-radius:3px;
  padding:10px 16px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--verde);margin-bottom:20px}
.status-dot{width:7px;height:7px;border-radius:50%;background:var(--verde-light);flex-shrink:0}
.status-bar.warning{background:#fdf6e8;border-color:rgba(184,92,0,.25);color:var(--aviso)}
.status-bar.warning .status-dot{background:var(--ouro)}

/* TABLE */
.table-wrap{background:var(--branco);border:1px solid var(--linha);border-radius:4px;
  overflow:hidden;box-shadow:var(--shadow)}
.table-header-row{background:var(--verde);color:#fff;display:grid;padding:0 16px;align-items:center;min-height:38px}
.table-header-row span{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;opacity:.85}

.defensor-row{border-bottom:1px solid var(--linha);transition:background .1s}
.defensor-row:last-child{border-bottom:none}
.defensor-row:hover{background:var(--verde-pale)}
.defensor-summary{display:grid;padding:12px 16px;align-items:center;cursor:pointer;gap:8px}
.defensor-name{font-weight:500;font-size:13px;color:var(--cinza-escuro)}
.defensor-lotacao{font-size:11px;color:var(--cinza-mid);margin-top:1px}
.defensor-matricula{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--cinza-mid)}
.defensor-portaria{font-size:11px;color:var(--cinza-mid);font-style:italic}
.expand-icon{font-size:10px;color:var(--cinza-mid);transition:transform .2s;justify-self:end}
.defensor-row.expanded .expand-icon{transform:rotate(90deg)}

/* FORM */
.defensor-form{display:none;background:#f8f9f7;border-top:1px solid var(--linha);padding:20px 16px}
.defensor-row.expanded .defensor-form{display:block}
.periodo-block{margin-bottom:20px}
.periodo-block:last-child{margin-bottom:0}
.periodo-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--verde);
  margin-bottom:12px;padding-bottom:6px;border-bottom:1px solid var(--linha)}
.etapas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.etapa-group{background:var(--branco);border:1px solid var(--linha);border-radius:3px;padding:10px 12px}
.etapa-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--cinza-mid);margin-bottom:8px}
.date-inputs{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.date-field label{display:block;font-size:10px;color:var(--cinza-mid);margin-bottom:3px}
.date-field input{width:100%;padding:6px 8px;border:1px solid var(--cinza-light);border-radius:2px;
  font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--cinza-escuro);background:var(--branco);
  outline:none;transition:border-color .15s}
.date-field input:focus{border-color:var(--verde-mid)}
.date-field input.changed{border-color:var(--ouro);background:var(--ouro-light)}
.portaria-row{margin-bottom:12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.portaria-row label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--cinza-mid);white-space:nowrap}
.portaria-row input{flex:1;min-width:200px;padding:6px 8px;border:1px solid var(--cinza-light);border-radius:2px;font-size:12px;color:var(--cinza-escuro);background:var(--branco);outline:none}
.portaria-row input:focus{border-color:var(--verde-mid)}
.form-actions{margin-top:14px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.btn-save{background:var(--verde);color:#fff;border:none;border-radius:2px;padding:8px 16px;
  font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;cursor:pointer;transition:background .15s}
.btn-save:hover{background:var(--verde-mid)}
.btn-clear{background:transparent;color:var(--erro);border:1px solid rgba(155,32,32,.3);border-radius:2px;
  padding:7px 14px;font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;cursor:pointer}
.btn-clear:hover{background:#fdf0f0}
.save-msg{font-size:11px;color:var(--verde-light);opacity:0;transition:opacity .3s}
.save-msg.show{opacity:1}

.badge{display:inline-block;padding:2px 7px;border-radius:2px;font-size:10px;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.badge-ok{background:var(--verde-pale);color:var(--verde)}
.badge-pending{background:#fdf6e8;color:var(--aviso)}
.badge-empty{background:#f5f5f5;color:var(--cinza-mid)}

/* TABS */
.tabs{display:flex;gap:0;border-bottom:2px solid var(--linha);margin-bottom:24px}
.tab-btn{padding:10px 20px;background:transparent;border:none;font-family:'IBM Plex Sans',sans-serif;
  font-size:12px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:var(--cinza-mid);
  cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px;transition:color .15s,border-color .15s}
.tab-btn.active{color:var(--verde);border-bottom-color:var(--verde)}
.tab-btn:hover:not(.active){color:var(--cinza-escuro)}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* FILTERS */
.filters-row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;align-items:flex-end}
.filter-group{display:flex;flex-direction:column;gap:4px}
.filter-group label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--cinza-mid)}
.filter-group select,.filter-group input{padding:7px 10px;border:1.5px solid var(--cinza-light);
  border-radius:2px;font-family:'IBM Plex Sans',sans-serif;font-size:12px;color:var(--cinza-escuro);
  background:var(--branco);outline:none;min-width:160px}
.filter-group select:focus,.filter-group input:focus{border-color:var(--verde-mid)}

/* CONSOLIDATED TABLE */
.consolidated-table{width:100%;border-collapse:collapse;font-size:12px}
.consolidated-table thead tr{background:var(--verde);color:#fff}
.consolidated-table th{padding:10px 12px;text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;white-space:nowrap}
.consolidated-table tbody tr{border-bottom:1px solid var(--linha);transition:background .1s}
.consolidated-table tbody tr:hover{background:var(--verde-pale)}
.consolidated-table td{padding:9px 12px;vertical-align:middle}
.mes-header td{background:var(--verde-pale);color:var(--verde);font-weight:600;font-size:11px;
  text-transform:uppercase;letter-spacing:.07em;padding:7px 12px;border-top:2px solid rgba(74,145,101,.2)}

.btn-pdf{background:var(--ouro);color:#fff;border:none;border-radius:2px;padding:9px 18px;
  font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;cursor:pointer;
  transition:background .15s;display:flex;align-items:center;gap:6px}
.btn-pdf:hover{background:#b89020}

/* PROGRESS */
.progress-summary{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:24px}
.progress-card{background:var(--branco);border:1px solid var(--linha);border-radius:3px;padding:12px 14px}
.progress-card-name{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;
  color:var(--cinza-mid);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.progress-bar-wrap{height:4px;background:var(--cinza-light);border-radius:2px;overflow:hidden;margin-bottom:4px}
.progress-bar-fill{height:100%;background:var(--verde-light);border-radius:2px;transition:width .3s}
.progress-nums{font-size:11px;color:var(--cinza-mid);display:flex;justify-content:space-between}

/* LOADING */
.loading-overlay{position:fixed;inset:0;background:rgba(26,74,46,.7);display:none;
  align-items:center;justify-content:center;z-index:9999;flex-direction:column;gap:12px}
.loading-overlay.show{display:flex}
.spinner{width:36px;height:36px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;
  border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:#fff;font-size:13px;font-weight:500}

.instrucoes-box{background:var(--ouro-light);border:1px solid rgba(201,162,39,.35);border-radius:3px;
  padding:14px 16px;font-size:12px;color:#6b4800;line-height:1.6;margin-bottom:20px}
.instrucoes-box strong{font-weight:600}

.empty-state{text-align:center;padding:48px 24px;color:var(--cinza-mid)}
.empty-state p{font-size:14px;margin-top:8px}

/* PRINT */
@media print{
  .topbar,.filters-row,.btn-pdf,.btn-save,.form-actions,.tabs,
  #login-screen,.page-header-bar,.instrucoes-box,.status-bar{display:none!important}
  body{background:#fff;font-size:10px}
  .consolidated-table{font-size:10px}
  .consolidated-table th,.consolidated-table td{padding:5px 8px}
  .print-header{display:block!important;text-align:center;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid #000}
  .print-header h1{font-family:'Crimson Pro',serif;font-size:16px;color:#000;font-weight:700}
  .print-header p{font-size:10px;color:#555;margin-top:3px}
  .print-header .resolucao{font-size:9px;color:#888;margin-top:2px}
  .mes-header td{background:#e8f3ec!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
.print-header{display:none}


/* TOGGLE ALTERAÇÃO */
.toggle-wrap{display:flex;align-items:center;gap:10px;margin-top:14px;padding-top:12px;border-top:1px solid var(--linha)}
.toggle-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--cinza-mid);margin-bottom:2px}
.toggle-switch{position:relative;display:inline-block;width:42px;height:24px;flex-shrink:0}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;inset:0;background:var(--cinza-light);border-radius:24px;transition:.25s}
.toggle-slider::before{content:'';position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.25s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle-switch input:checked + .toggle-slider{background:var(--ouro)}
.toggle-switch input:checked + .toggle-slider::before{transform:translateX(18px)}
.toggle-desc{font-size:11px;color:var(--cinza-mid);line-height:1.4}
.badge-alterado{background:#fdf0d0;color:#7a4a00;border:1px solid rgba(201,162,39,.4)}
.ano-selector{display:flex;align-items:center;gap:6px}
.ano-select-wrap{position:relative;display:flex;align-items:center}
.ano-select{appearance:none;-webkit-appearance:none;background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.25);color:#fff;padding:5px 28px 5px 12px;
  border-radius:3px;font-family:'IBM Plex Mono',monospace;font-size:14px;font-weight:600;
  cursor:pointer;outline:none;transition:all .15s;min-width:72px}
.ano-select:hover,.ano-select:focus{background:rgba(255,255,255,.2);border-color:rgba(255,255,255,.5)}
.ano-select option{background:#1a4a2e;color:#fff;font-weight:500}
.ano-select-arrow{position:absolute;right:8px;pointer-events:none;color:rgba(255,255,255,.7);font-size:10px}
.ano-add{background:transparent;border:1px dashed rgba(255,255,255,.35);color:rgba(255,255,255,.6);
  width:24px;height:24px;border-radius:50%;font-size:16px;line-height:1;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s;padding:0}
.ano-add:hover{background:rgba(255,255,255,.15);color:#fff;border-color:rgba(255,255,255,.6)}
tr.row-alterado td{background:#fffbec!important}
tr.row-alterado:hover td{background:#fff8dc!important}


/* GERENCIAR ACESSOS */
.acessos-card{background:var(--branco);border:1px solid var(--linha);border-radius:4px;padding:20px 24px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.acessos-card-info{flex:1;min-width:180px}
.acessos-card-label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--cinza-escuro)}
.acessos-card-hint{font-size:11px;color:var(--cinza-mid);margin-top:3px}
.senha-wrap{display:flex;align-items:center;gap:6px;min-width:260px}
.senha-wrap input{flex:1;padding:8px 10px;border:1.5px solid var(--cinza-light);border-radius:3px;
  font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--cinza-escuro);background:var(--branco);outline:none;transition:border-color .15s}
.senha-wrap input:focus{border-color:var(--verde-mid)}
.btn-eye{background:transparent;border:none;cursor:pointer;color:var(--cinza-mid);font-size:16px;padding:4px;line-height:1;transition:color .15s}
.btn-eye:hover{color:var(--cinza-escuro)}
.btn-salvar-senha{background:var(--verde);color:#fff;border:none;border-radius:2px;padding:8px 14px;
  font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;white-space:nowrap;transition:background .15s}
.btn-salvar-senha:hover{background:var(--verde-mid)}
.btn-salvar-senha.saved{background:#4a9165}

@media(max-width:640px){
  .main-content{padding:16px}
  .topbar{padding:0 16px}
  .topbar-logo{font-size:13px}
  .login-card{padding:32px 24px}
  .etapas-grid{grid-template-columns:1fr}
}

/* BUSCA DIRETORIA */
.busca-dir-wrap{margin-bottom:12px}
.busca-defensor-input{width:100%;padding:10px 14px;border:1.5px solid var(--cinza-light);
  border-radius:3px;font-family:'IBM Plex Sans',sans-serif;font-size:13px;
  color:var(--cinza-escuro);background:var(--branco);outline:none;transition:border-color .15s}
.busca-defensor-input:focus{border-color:var(--verde-mid)}
.defensor-row.hidden-by-search{display:none}
</style>
</head>

// ── Gerenciamento de senhas via Firestore ──────────────────────────────────
async function carregarSenhas() {
  try {
    const snap = await window.dbLoad('_controle', 'senhas');
    if (snap) senhasDinamicas = snap;
  } catch(e) { /* usa senhas padrão */ }
}

function getSenha(dirKey) {
  return senhasDinamicas[dirKey] || DIRETORIAS[dirKey]?.senha || '';
}

async function salvarSenha(dirKey, novaSenha, btnEl) {
  if (!novaSenha || novaSenha.trim().length < 4) {
    alert('A senha deve ter pelo menos 4 caracteres.'); return;
  }
  senhasDinamicas[dirKey] = novaSenha.trim();
  showLoading('Salvando senha...');
  try {
    await window.dbSave('_controle', 'senhas', senhasDinamicas);
    hideLoading();
    if (btnEl) { btnEl.textContent = '✓ Salva'; btnEl.classList.add('saved'); setTimeout(() => { btnEl.textContent = 'Salvar'; btnEl.classList.remove('saved'); }, 2000); }
  } catch(e) { hideLoading(); alert('Erro ao salvar: ' + e.message); }
}

function toggleSenhaVisivel(inputId, btnEl) {
  const inp = document.getElementById(inputId);
  if (!inp) return;
  if (inp.type === 'password') { inp.type = 'text'; btnEl.textContent = '🙈'; }
  else { inp.type = 'password'; btnEl.textContent = '👁'; }
}

function renderAcessosTab() {
  const el = document.getElementById('tab-acessos');
  if (!el) return;
  const dirs = Object.entries(DIRETORIAS);
  const cards = dirs.map(([key, cfg]) => {
    const id = 'senha-inp-' + key;
    const atual = getSenha(key);
    return `<div class="acessos-card">
      <div class="acessos-card-info">
        <div class="acessos-card-label">${cfg.label}</div>
        <div class="acessos-card-hint">${key==='GABINETE'?'Visão consolidada':'Acesso da diretoria'}</div>
      </div>
      <div class="senha-wrap">
        <input type="password" id="${id}" value="${atual}" placeholder="Nova senha" autocomplete="new-password">
        <button class="btn-eye" onclick="toggleSenhaVisivel('${id}',this)" title="Mostrar/ocultar">👁</button>
        <button class="btn-salvar-senha" onclick="salvarSenha('${key}',document.getElementById('${id}').value,this)">Salvar</button>
      </div>
    </div>`;
  }).join('');
  el.innerHTML = `<div style="padding:4px 0 20px">
    <div class="instrucoes-box">
      <strong>Gerenciar Acessos:</strong> clique em 👁 para ver a senha atual de cada unidade.
      Digite a nova senha e clique em <strong>Salvar</strong> — a mudança vale imediatamente para todos, sem atualizar o sistema.
    </div>
    <div class="table-wrap" style="padding:16px">${cards}</div></div>`;
}

function renderAnoSelector() {
  const anosBase = Object.keys(DADOS_ANOS).map(Number);
  const todos = [...new Set([...anosBase, ...anosExtras])].sort((a,b)=>a-b);
  const el = document.getElementById('ano-selector');
  if (!el) return;
  const opts = todos.map(a =>
    '<option value="' + a + '"' + (a===currentAno?' selected':'') + '>' + a + '</option>'
  ).join('');
  const addBtn = currentUser==='GABINETE'
    ? '<button class="ano-add" onclick="adicionarAno()" title="Adicionar novo ano">+</button>' : '';
  el.innerHTML = '<div class="ano-select-wrap"><select class="ano-select" onchange="switchAno(parseInt(this.value))">' + opts + '</select><span class="ano-select-arrow">▾</span></div>' + addBtn;
}

async function adicionarAno() {
  const novoAno = parseInt(prompt('Informe o ano de fruição a adicionar (ex: 2028):'));
  if (!novoAno || isNaN(novoAno) || novoAno < 2020 || novoAno > 2040) {
    alert('Ano inválido.'); return;
  }
  const anosBase = Object.keys(DADOS_ANOS).map(Number);
  const todos = [...new Set([...anosBase, ...anosExtras])];
  if (todos.includes(novoAno)) { alert('Ano ' + novoAno + ' já existe no sistema.'); return; }
  showLoading('Criando ano ' + novoAno + '...');
  try {
    // Salva a lista de anos extras no Firestore
    anosExtras.push(novoAno);
    await window.dbSave('_controle', 'anos_extras', { anos: anosExtras });
    hideLoading();
    renderAnoSelector();
    alert('Ano ' + novoAno + ' adicionado! As diretorias já podem acessá-lo e preencher os dados.');
  } catch(e) {
    hideLoading(); alert('Erro: ' + e.message);
  }
}

async function carregarAnosExtras() {
  try {
    const snap = await window.dbLoad('_controle', 'anos_extras');
    if (snap && snap.anos) {
      anosExtras = snap.anos.filter(a => !Object.keys(DADOS_ANOS).map(Number).includes(a));
    }
  } catch(e) { /* silencioso: Firestore pode ainda não ter esse doc */ }
}

async function switchAno(ano) {
  if (ano === currentAno) return;
  currentAno = ano;
  currentData = {};
  renderAnoSelector();
  if (!currentUser) return;
  showLoading('Carregando dados de ' + ano + '...');
  try {
    await carregarAnosExtras();
    if (currentUser !== 'GABINETE') {
      const saved = await window.dbLoad(currentAno, currentUser);
      currentData = saved || {};
    }
  } catch(e) { hideLoading(); alert('Erro ao carregar: ' + e.message); return; }
  hideLoading();
  if (currentUser === 'GABINETE') renderGabinete();
  else renderDiretoria(currentUser);
}

// ── Aguarda Firebase inicializar ──
let firebaseReady = false;
window.addEventListener('load', () => {
  // Tenta chamar dbLoad como sinal de que o módulo Firebase carregou
  const check = setInterval(() => {
    if (typeof window.dbSave === 'function') {
      firebaseReady = true;
      clearInterval(check);
      window.dbSeed(); // seed automático na primeira conexão
      document.getElementById('firebase-status').innerHTML =
        '<strong style="color:var(--verde)">✓ Conectado ao Firebase</strong> · Dados salvos na nuvem, não no seu computador.';
      document.getElementById('btn-login').disabled = false;
    }
  }, 200);

  // Timeout de 10s
  setTimeout(() => {
    if (!firebaseReady) {
      clearInterval(check);
      document.getElementById('firebase-status').innerHTML =
        '⚠ <strong>Firebase não conectou.</strong> Verifique a configuração no código.';
    }
  }, 10000);
});

async function doLogin() {
  const dir   = document.getElementById('login-diretoria').value;
  const senha = document.getElementById('login-senha').value;
  const errEl = document.getElementById('login-error');

  errEl.style.display = 'none';

  if (!dir) { errEl.textContent='Selecione a diretoria.'; errEl.style.display='block'; return; }
  if (senha !== getSenha(dir)) {
    errEl.textContent = 'Senha incorreta.'; errEl.style.display='block'; return;
  }
  if (!firebaseReady) {
    errEl.textContent = 'Aguarde: Firebase ainda está conectando…'; errEl.style.display='block'; return;
  }

  showLoading('Carregando dados do Firebase...');
  currentUser = dir;

  try {
    if (dir !== 'GABINETE') {
      const saved = await window.dbLoad(currentAno, dir);
      currentData = saved || {};
    }
  } catch(e) {
    hideLoading();
    errEl.textContent = 'Erro ao carregar dados: ' + e.message; errEl.style.display='block'; return;
  }

  hideLoading();
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('topbar-nome-diretoria').textContent = DIRETORIAS[dir].label;
  await Promise.all([carregarSenhas(), carregarAnosExtras()]);
  renderAnoSelector();

  if (dir === 'GABINETE') renderGabinete();
  else renderDiretoria(dir);
}

function doLogout() {
  currentUser = null; currentData = {}; currentAno = 2026;
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-senha').value = '';

function mascaraData(el) {
  // Remove tudo que não é dígito
  let v = el.value.replace(/\D/g, '');
  // Limita a 8 dígitos
  if (v.length > 8) v = v.slice(0, 8);
  // Formata progressivamente: dd/mm/aaaa
  if (v.length >= 5) {
    v = v.slice(0,2) + '/' + v.slice(2,4) + '/' + v.slice(4);
  } else if (v.length >= 3) {
    v = v.slice(0,2) + '/' + v.slice(2);
  }
  el.value = v;
}

function filtrarDefensores() {
  const q = (document.getElementById('busca-defensor')?.value || '').toLowerCase().trim();
  document.querySelectorAll('#defensores-list .defensor-row').forEach(row => {
    const nome = (row.querySelector('.defensor-name')?.textContent || '').toLowerCase();
    const lot  = (row.querySelector('.defensor-lotacao')?.textContent || '').toLowerCase();
    if (!q || nome.includes(q) || lot.includes(q)) {
      row.classList.remove('hidden-by-search');
    } else {
      row.classList.add('hidden-by-search');
      row.classList.remove('expanded'); // fecha se estava aberto
    }
  });
}

function markChanged(el) { el.classList.add('changed'); }

async function saveDefensor(idx, dir, matricula) {
  const key    = `${matricula}_${idx}`;
  const fields = ['p1e1','p1e2','p1e3','p2e1','p2e2','p2e3'];
  const entry  = {};

  const portP1 = document.getElementById(`inp-${idx}-portaria_p1`);
  const portP2 = document.getElementById(`inp-${idx}-portaria_p2`);
  if (portP1) entry.portaria_p1 = portP1.value.trim();
  if (portP2) entry.portaria_p2 = portP2.value.trim();
  // Mantém portaria2027 para compatibilidade retroativa
  if (portP1) entry.portaria2027 = portP1.value.trim();

  const altEl = document.getElementById(`inp-${idx}-alterado`);
  if (altEl) entry.alterado = altEl.checked;

  fields.forEach(f => {
    const ini = document.getElementById(`inp-${idx}-${f}-ini`);
    const fim = document.getElementById(`inp-${idx}-${f}-fim`);
    if (ini) entry[f+'_ini'] = ini.value.trim();
    if (fim) entry[f+'_fim'] = fim.value.trim();
  });

  currentData[key] = entry;
  showLoading('Salvando no Firebase...');

  try {
    await window.dbSave(currentAno, dir, currentData);
  } catch(e) {
    hideLoading();
    alert('Erro ao salvar: ' + e.message);
    return;
  }

  hideLoading();

  const badge = document.getElementById('badge-' + idx);
  const msg   = document.getElementById('msg-' + idx);
  if (badge) { badge.className='badge badge-ok'; badge.textContent='✓ Salvo'; }
  if (msg)   { msg.classList.add('show'); setTimeout(() => msg.classList.remove('show'), 2500); }

  document.querySelectorAll(`#form-${idx} .changed`).forEach(el => el.classList.remove('changed'));

  // Atualiza contador status
  const total = (DADOS_ANOS[currentAno]||DADOS_ANOS[2027]||{})[dir]?.defensores?.length || 0;
  const done  = Object.keys(currentData).length;
  const st    = document.getElementById('status-text');
  if (st) st.textContent = `${done} de ${total} registros preenchidos`;
}

async function clearDefensor(idx, dir, matricula) {
  if (!confirm('Limpar todos os dados salvos deste registro?')) return;
  const key = `${matricula}_${idx}`;
  delete currentData[key];
  showLoading('Atualizando...');
  try {
    await window.dbSave(currentAno, dir, currentData);
  } catch(e) { hideLoading(); alert('Erro: ' + e.message); return; }
  hideLoading();

  const badge = document.getElementById('badge-' + idx);
  if (badge) { badge.className='badge badge-empty'; badge.textContent='Pendente'; }

  ['p1e1','p1e2','p1e3','p2e1','p2e2','p2e3'].forEach(f => {
    const ini = document.getElementById(`inp-${idx}-${f}-ini`);
    const fim = document.getElementById(`inp-${idx}-${f}-fim`);
    if (ini) { ini.value=''; ini.classList.remove('changed'); }
    if (fim) { fim.value=''; fim.classList.remove('changed'); }
  });
}

function getConsolidatedRows() {
  const rows = [];
  Object.entries(DIRETORIAS).filter(([k]) => k !== 'GABINETE').forEach(([dir, cfg]) => {
    const defensores = (DADOS_ANOS[currentAno]||DADOS_ANOS[2027]||{})[dir]?.defensores || [];
    const saved = allSavedData[dir] || {};
    defensores.forEach((d, i) => {
      const key   = `${d.matricula}_${i}`;
      const entry = saved[key] || {};
      ['p1e1','p1e2','p1e3','p2e1','p2e2','p2e3'].forEach(f => {
        const ini = entry[f+'_ini'] || d[f+'_ini'] || '';
        const fim = entry[f+'_fim'] || d[f+'_fim'] || '';
        const isP2 = f.startsWith('p2');
        const portaria = isP2
          ? (entry.portaria_p2 || entry.portaria2027 || d.portaria || '')
          : (entry.portaria_p1 || entry.portaria2027 || d.portaria || '');
        if (ini && fim) {
          rows.push({
            dir, dirLabel: cfg.label,
            matricula: d.matricula, nome: d.nome, lotacao: d.lotacao,
            portaria: portaria,
            periodo: isP2 ? 'P2' : 'P1',
            inicio: ini, fim: fim,
            mes: parseMonth(ini),
            fromSaved: !!saved[key],
            alterado: !!(saved[key] && saved[key].alterado)
          });
        }
      });
    });
  });
  return rows.sort((a,b) => a.mes !== b.mes ? a.mes-b.mes : a.nome.localeCompare(b.nome,'pt-BR'));
}

function parseMonth(s) {
  if (!s) return 99;
  const p = s.split('/');
  return p.length >= 2 ? parseInt(p[1]) || 99 : 99;
}

function renderResumo() {
  const el = document.getElementById('tab-resumo');
  const dirsResume = Object.keys(DIRETORIAS).filter(k => k !== 'GABINETE');
  let totalAlterados = 0;
  dirsResume.forEach(dir => {
    const saved = allSavedData[dir] || {};
    Object.values(saved).forEach(v => { if (v && v.alterado) totalAlterados++; });
  });
  const corBadge = totalAlterados > 0 ? '#fff3cd' : '#f0f6f2';
  const corBorda = totalAlterados > 0 ? '#ffc107' : 'rgba(74,145,101,.2)';
  const corTexto = totalAlterados > 0 ? '#856404' : 'var(--cinza-mid)';
  const icone    = totalAlterados > 0 ? '⚠' : '✓';
  const msg      = totalAlterados > 0
    ? totalAlterados + ' registro' + (totalAlterados>1?'s':'') + ' com alteração de férias — veja destaque na aba <strong>Escala por Mês</strong>'
    : 'Nenhuma alteração de férias registrada pelas diretorias';
  const badgeAlteracoes = '<div style="display:flex;align-items:center;gap:8px;background:'+corBadge+';border:1px solid '+corBorda+';color:'+corTexto+';border-radius:3px;padding:10px 14px;font-size:12px;margin-bottom:16px"><span style="font-size:14px">'+icone+'</span><span>'+msg+'</span></div>';
  const dirs = Object.keys(DIRETORIAS).filter(k => k !== 'GABINETE');
  let html = badgeAlteracoes + '<div class="progress-summary">';
  dirs.forEach(dir => {
    const defs  = (DADOS_ANOS[currentAno]||DADOS_ANOS[2027]||{})[dir]?.defensores || [];
    const saved = allSavedData[dir] || {};
    const done  = defs.filter((d,i) => saved[`${d.matricula}_${i}`]).length;
    const pct   = defs.length ? Math.round(done/defs.length*100) : 0;
    html += `
      <div class="progress-card">
        <div class="progress-card-name">${DIRETORIAS[dir].label}</div>
        <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
        <div class="progress-nums"><span>${done}/${defs.length}</span><span>${pct}%</span></div>
      </div>`;
  });
  html += '</div>';
  const rows = getConsolidatedRows();
  const total = rows.length;
  const withSaved = rows.filter(r => r.fromSaved).length;
  html += `
    <div class="status-bar">
      <div class="status-dot"></div>
      <span>Total de etapas na escala: <strong>${total}</strong>
        · ${withSaved} com dados ${currentAno} inseridos
        · ${total-withSaved} usando dados de referência</span>
    </div>`;
  el.innerHTML = html;
}

// Inicializa os filtros persistentes (renderizados UMA VEZ)
function initFiltros() {
  const el = document.getElementById('tab-escala');
  if (document.getElementById('filtro-nome')) return; // já existe
  el.innerHTML = `
    <div class="filters-row" id="filtros-persistentes">
      <div class="filter-group">
        <label>Mês</label>
        <select id="filtro-mes" onchange="renderEscalaConsolidada()">
          <option value="">Todos os meses</option>
          ${MESES.map((m,i) => '<option value="'+(i+1)+'">' + m + '</option>').join('')}
        </select>
      </div>
      <div class="filter-group">
        <label>Diretoria</label>
        <select id="filtro-dir" onchange="renderEscalaConsolidada()">
          <option value="">Todas</option>
          ${Object.entries(DIRETORIAS).filter(([k])=>k!=='GABINETE').map(([k,v]) =>
            '<option value="'+k+'">' + v.label + '</option>').join('')}
        </select>
      </div>
      <div class="filter-group">
        <label>Nome</label>
        <input type="text" id="filtro-nome" placeholder="Buscar pelo nome…"
               oninput="renderEscalaConsolidada()">
      </div>
    </div>
    <div id="tabela-escala-resultado"></div>`;
}

function renderEscalaConsolidada() {
  initFiltros(); // garante que os filtros existem (não os destrói)

  const mesF  = document.getElementById('filtro-mes')?.value || '';
  const dirF  = document.getElementById('filtro-dir')?.value || '';
  const nomeF = (document.getElementById('filtro-nome')?.value || '').toLowerCase();
  const dest  = document.getElementById('tabela-escala-resultado');
  if (!dest) return;

  let rows = getConsolidatedRows();
  if (mesF)  rows = rows.filter(r => r.mes == parseInt(mesF));
  if (dirF)  rows = rows.filter(r => r.dir === dirF);
  if (nomeF) rows = rows.filter(r => r.nome.toLowerCase().includes(nomeF));

  if (!rows.length) {
    dest.innerHTML = '<div class="empty-state"><p>Nenhum registro para os filtros selecionados.</p></div>';
    return;
  }

  let tableHtml = `
    <div class="table-wrap">
      <div class="print-header">
        <h1>Defensoria Pública do Estado do Piauí</h1>
        <p id='print-titulo-ano'>Escala Anual de Férias dos Membros DPE/PI — ${currentAno}</p>
        <div class="resolucao">Resolução CSDPE nº 193/2026 | Portaria GDPG nº 614/2026 | Dados inseridos sob responsabilidade de cada Diretoria</div>
      </div>
      <table class="consolidated-table">
        <thead>
          <tr>
            <th>Matrícula</th>
            <th>Nome do(a) Defensor(a)</th>
            <th>Lotação / Defensoria</th>
            <th>Per.</th>
            <th>Início</th>
            <th>Fim</th>
            <th>Portaria de Concessão</th>
          </tr>
        </thead>
        <tbody>`;

  let lastMes = -1;
  rows.forEach(r => {
    if (r.mes !== lastMes) {
      lastMes = r.mes;
      tableHtml += `<tr class="mes-header"><td colspan="6">${MESES[r.mes-1]?.toUpperCase() || '?'}/2027</td></tr>`;
    }
    tableHtml += `
      <tr class="${r.alterado ? 'row-alterado' : ''}">
        <td style="font-family:'IBM Plex Mono',monospace;font-size:11px">${r.matricula}</td>
        <td style="font-weight:500">${r.nome}${r.alterado ? ' <span class="badge badge-alterado" style="font-size:9px">↺</span>' : ''}</td>
        <td>${r.lotacao}</td>
        <td style="font-family:'IBM Plex Mono',monospace;font-size:11px;text-align:center">
          <span class="badge ${r.periodo==='P2'?'badge-pending':'badge-ok'}" style="font-size:9px">${r.periodo}</span>
        </td>
        <td style="font-family:'IBM Plex Mono',monospace;font-size:11px;white-space:nowrap">${r.inicio}</td>
        <td style="font-family:'IBM Plex Mono',monospace;font-size:11px;white-space:nowrap">${r.fim}</td>
        <td style="font-size:11px">${r.portaria}</td>
      </tr>`;
  });
  tableHtml += '</tbody></table></div>';
  dest.innerHTML = tableHtml;
}

function renderAllRegistros() {
  const el = document.getElementById('tab-all');
  let html = '';
  Object.entries(DIRETORIAS).filter(([k]) => k !== 'GABINETE').forEach(([dir, cfg]) => {
    const defs  = (DADOS_ANOS[currentAno]||DADOS_ANOS[2027]||{})[dir]?.defensores || [];
    const saved = allSavedData[dir] || {};
    html += `
      <div style="margin-bottom:24px">
        <div style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;
                    color:var(--verde);padding:10px 0 8px;border-bottom:2px solid var(--verde-pale);margin-bottom:12px">
          ${cfg.label}
        </div>
        <div class="table-wrap">
          <table class="consolidated-table">
            <thead><tr><th>Matrícula</th><th>Nome</th><th>Lotação</th><th>Portaria Ref.</th><th>Status</th></tr></thead>
            <tbody>
              ${defs.map((d,i) => {
                const hasSaved = !!saved[`${d.matricula}_${i}`];
                return `<tr>
                  <td style="font-family:'IBM Plex Mono',monospace;font-size:11px">${d.matricula}</td>
                  <td style="font-weight:500">${d.nome}</td>
                  <td style="font-size:11px">${d.lotacao}</td>
                  <td style="font-size:11px;font-style:italic">${d.portaria}</td>
                  <td><span class="badge ${hasSaved ? 'badge-ok' : 'badge-empty'}">
                    ${hasSaved ? '✓ 2027 inserido' : 'Pendente'}</span></td>
                </tr>`;
              }).join('')}
            </tbody>
          </table>
        </div>
      </div>`;
  });
  el.innerHTML = html;
}

function switchTab(id, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(id)?.classList.add('active');
  if (btn) btn.classList.add('active');
  if (id === 'tab-escala') renderEscalaConsolidada();
}

function gerarPDF() {
  switchTab('tab-escala', document.querySelectorAll('.tab-btn')[1]);
  const fmEl = document.getElementById('filtro-mes');
  const fdEl = document.getElementById('filtro-dir');
  const fnEl = document.getElementById('filtro-nome');
  if (fmEl) fmEl.value = '';
  if (fdEl) fdEl.value = '';
  if (fnEl) fnEl.value = '';
  renderEscalaConsolidada(); // já insere currentAno no cabeçalho via template literal
  setTimeout(() => window.print(), 400);
}

// UTILS
function showLoading(msg) {
  document.getElementById('loading-text').textContent = msg || 'Carregando...';
  document.getElementById('loading').classList.add('show');
}
function hideLoading() {
  document.getElementById('loading').classList.remove('show');
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('login-senha').addEventListener('keypress', e => {
    if (e.key === 'Enter') doLogin();
  });
});
</script>
